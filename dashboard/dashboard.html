<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stress Detection Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🧠 Stress Detection Dashboard</h1>

    <div class="card controls">
        <button onclick="startDaemon()">Start</button>
        <button onclick="stopDaemon()">Stop</button>
    </div>

    <div class="card">

        <div id="status" class="status">
            Loading...
        </div>

        <p id="statusText"></p>

        <div class="stats">

            <div class="stat-box">
                <div class="stat-label">Calibration</div>
                <div class="stat-value" id="calibration">0/4</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Windows</div>
                <div class="stat-value" id="windows">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Normal</div>
                <div class="stat-value" id="normalCount">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Stress</div>
                <div class="stat-value" id="stressCount">0</div>
            </div>

        </div>

        <br>

        <strong>Last Result:</strong>
        <span id="lastResult">-</span>

    </div>

    <div class="card">

        <h2>Latest Features</h2>

        <table id="featuresTable">

            <thead>
                <tr>
                    <th>Feature</th>
                    <th>Value</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

    <div class="card">

        <h2>Recent History</h2>

        <div id="history"></div>

    </div>

    <div class="card">

        <h2>Live Logs</h2>

        <div id="logs"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
